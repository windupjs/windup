name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: packages/windup
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install workspace dependencies
        run: npm ci
        working-directory: .

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run typecheck

      # Test suite is hermetic w.r.t. LLMs (no API key needed): planner tests
      # use fakes, the vitest adapter seeds a known-good cached plan. Browser
      # tests hit saucedemo.com (stable public demo site).
      - name: Tests
        run: npx vitest run

      - name: Build
        run: npm run build
