services:
  windup:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - path: ../.env
        required: false
    volumes:
      # Without the .windup volume every run is a cache miss and replay
      # validation cannot work.
      - ../.windup:/app/.windup
      - ../scenarios:/app/scenarios:ro
      - ../fragments:/app/fragments:ro
